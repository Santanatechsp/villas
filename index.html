<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Últimas Notícias - CNN Brasil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: Arial, sans-serif; overflow: hidden; }
    body { position: relative; background-color: #000; color: #fff; }

    .relogio {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 10rem;
      font-family: Arial, sans-serif;
      color: #fff;
      background: none;
      padding: 0;
      border: none;
      z-index: 10;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
    }

    .card { position: relative; width: 100%; height: 100%; }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
      z-index: 0;
    }
    .card-content {
      position: absolute;
      bottom: 60px;
      left: 40px;
      right: 40px;
      z-index: 1;
      background: rgba(0, 0, 0, 0.5);
      padding: 30px;
      border-radius: 16px;
    }
    .card-title {
      font-size: 2.2rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
      margin-bottom: 10px;
    }
    .card-date { font-size: 1.2rem; color: #ccc; }

    .container { height: 100%; width: 100%; }
    .status {
      position: absolute;
      left: 20px;
      top: 20px;
      z-index: 20;
      font-size: 14px;
      opacity: 0.85;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 55vw;
    }
  </style>
</head>

<body>
  <div class="relogio" id="relogio">00:00</div>
  <div class="status" id="status">Iniciando…</div>
  <div class="container" id="news-container">Carregando…</div>

  <script>
    const container = document.getElementById("news-container");
    const relogio = document.getElementById("relogio");
    const statusEl = document.getElementById("status");

    let noticias = [];
    let indexAtual = 0;
    let tickerTimer = null;

    const FEED_URL = "https://admin.cnnbrasil.com.br/sitemap-news.xml";

    // =========================
    // Relógio
    // =========================
    function atualizarRelogio() {
      const agora = new Date();
      const horas = String(agora.getHours()).padStart(2, "0");
      const minutos = String(agora.getMinutes()).padStart(2, "0");
      relogio.textContent = `${horas}:${minutos}`;
    }
    setInterval(atualizarRelogio, 1000);
    atualizarRelogio();

    // =========================
    // Fetch com timeout + fallback de proxies
    // =========================
    async function fetchWithTimeout(url, ms = 10000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), ms);
      try {
        const r = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.text();
      } finally {
        clearTimeout(t);
      }
    }

    function buildProxyCandidates(targetUrl) {
      const enc = encodeURIComponent(targetUrl);

      // 1) AllOrigins (raw)
      const allOrigins = `https://api.allorigins.win/raw?url=${enc}`;

      // 2) r.jina.ai (pega conteúdo e ignora CORS; bom como fallback)
      // Obs: retorna texto "renderizado" (ainda serve porque é XML em texto)
      const jina = `https://r.jina.ai/http://${targetUrl.replace(/^https?:\/\//, "")}`;

      // 3) cors.isomorphic-git.org
      const isoGit = `https://cors.isomorphic-git.org/${targetUrl}`;

      // 4) CodeTabs
      const codetabs = `https://api.codetabs.com/v1/proxy/?quest=${enc}`;

      return [allOrigins, jina, isoGit, codetabs];
    }

    async function fetchFeedXml() {
      const candidates = buildProxyCandidates(FEED_URL);

      let lastErr = null;
      for (const u of candidates) {
        try {
          statusEl.textContent = `Buscando feed… (${new URL(u).hostname})`;
          const txt = await fetchWithTimeout(u, 12000);

          // valida mínimo pra não aceitar HTML de bloqueio
          if (!txt || txt.length < 50) throw new Error("Resposta vazia/curta");
          if (txt.trim().startsWith("<!DOCTYPE html") || txt.includes("<html")) {
            throw new Error("Proxy retornou HTML (bloqueio/erro)");
          }

          return txt;
        } catch (e) {
          lastErr = e;
          console.warn("Falhou:", u, e);
        }
      }
      throw new Error(`Falha em todos os proxies. Último erro: ${lastErr?.message || "desconhecido"}`);
    }

    // =========================
    // Parse do XML (CNN sitemap news)
    // =========================
    function parseNoticiasFromXml(xmlText, maxItems = 60) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "text/xml");

      // se der erro de parse:
      const parseError = xml.getElementsByTagName("parsererror")[0];
      if (parseError) throw new Error("XML inválido (parsererror)");

      const urls = Array.from(xml.getElementsByTagName("url"));

      const nsImage = "http://www.google.com/schemas/sitemap-image/1.1";
      const nsNews  = "http://www.google.com/schemas/sitemap-news/0.9";

      const out = [];

      for (const urlNode of urls) {
        const imagemTag = urlNode.getElementsByTagNameNS(nsImage, "loc")[0];
        const tituloTag = urlNode.getElementsByTagNameNS(nsNews, "title")[0];
        const dataTag   = urlNode.getElementsByTagNameNS(nsNews, "publication_date")[0];

        const imagem = imagemTag?.textContent?.trim() || "";
        const titulo = tituloTag?.textContent?.trim() || "Sem título";
        const dataIso = dataTag?.textContent?.trim() || "";

        let dataFormatada = "Data indisponível";
        let dataEpoch = 0;

        if (dataIso) {
          const d = new Date(dataIso);
          if (!isNaN(d.getTime())) {
            dataEpoch = d.getTime();
            dataFormatada = d.toLocaleString("pt-BR", { dateStyle: "medium", timeStyle: "short" });
          }
        }

        if (imagem && titulo) {
          out.push({ imagem, titulo, data: dataFormatada, dataEpoch });
        }
      }

      // ordena por mais recente
      out.sort((a, b) => (b.dataEpoch || 0) - (a.dataEpoch || 0));

      // limita
      return out.slice(0, maxItems);
    }

    // =========================
    // Cache (pra não ficar em branco se o fetch cair)
    // =========================
    const CACHE_KEY = "cnn_news_cache_v1";

    function saveCache(items) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({
          savedAt: Date.now(),
          items
        }));
      } catch {}
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (!obj?.items?.length) return null;
        return obj;
      } catch {
        return null;
      }
    }

    // =========================
    // Exibição
    // =========================
    function exibirNoticia() {
      if (!noticias.length) return;

      const noticia = noticias[indexAtual];
      container.innerHTML = "";

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${noticia.imagem}" alt="Imagem da notícia">
        <div class="card-content">
          <div class="card-title">${escapeHtml(noticia.titulo)}</div>
          <div class="card-date">${escapeHtml(noticia.data)}</div>
        </div>
      `;
      container.appendChild(card);

      indexAtual = (indexAtual + 1) % noticias.length;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function startTicker() {
      if (tickerTimer) clearInterval(tickerTimer);
      exibirNoticia();
      tickerTimer = setInterval(exibirNoticia, 20000);
    }

    // =========================
    // Ciclo principal
    // =========================
    async function carregarNoticias() {
      try {
        statusEl.textContent = "Carregando notícias…";
        const xmlText = await fetchFeedXml();
        const items = parseNoticiasFromXml(xmlText, 60);

        if (!items.length) throw new Error("Nenhuma notícia encontrada no feed");

        noticias = items;
        indexAtual = 0;
        saveCache(items);

        statusEl.textContent = `OK: ${items.length} notícias (atualizado em ${new Date().toLocaleTimeString("pt-BR")})`;
        startTicker();
      } catch (error) {
        console.error(error);

        // fallback: cache
        const cached = loadCache();
        if (cached?.items?.length) {
          noticias = cached.items;
          indexAtual = 0;
          statusEl.textContent =
            `Sem internet/proxy bloqueado. Usando cache (${noticias.length}) salvo em ${new Date(cached.savedAt).toLocaleString("pt-BR")}`;
          startTicker();
        } else {
          container.innerHTML = `<p style="color:#fff; padding: 40px; font-size: 20px;">
            Erro ao carregar notícias: ${escapeHtml(error.message)}
          </p>`;
          statusEl.textContent = "ERRO ao carregar (sem cache)";
        }
      }
    }

    // 1) carrega agora
    carregarNoticias();

    // 2) atualiza o feed periodicamente (ex.: a cada 5 minutos)
    setInterval(carregarNoticias, 5 * 60 * 1000);
  </script>
</body>
</html>
